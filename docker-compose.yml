# ============================================================
#  AI Agent Stack
#  Ollama  |  Open WebUI  |  SearXNG
# ============================================================

services:

  # ----------------------------------------------------------
  #  Ollama — local LLM runtime
  # ----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ai-agent-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      # Default: named volume "ollama-data". Set OLLAMA_MODELS_DIR in .env to a host path
      # (e.g. WSL /mnt/d/side/ollama-models → D:\side\ollama-models) to store blobs on D:.
      - ${OLLAMA_MODELS_DIR:-ollama-data}:/root/.ollama
    environment:
      # How long to keep a model hot in memory after the last request.
      # Set to 0 to unload immediately, -1 to never unload.
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-5m}
      # Concurrent request slots. Keep at 1 for low-spec machines.
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      # Threads used for CPU inference (0 = auto-detect)
      - OLLAMA_NUM_THREADS=${OLLAMA_NUM_THREADS:-0}
    networks:
      - ai-agent-network
    # ollama/ollama image has no curl (healthcheck would always fail). Use the CLI instead.
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  #  Open WebUI — chat interface + agent tools + RAG
  # ----------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-agent-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-change-me-to-a-long-random-string}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-true}
      # Web search via SearXNG
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
      # RAG settings
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=${RAG_EMBEDDING_MODEL:-nomic-embed-text}
      - CHUNK_SIZE=1500
      - CHUNK_OVERLAP=100
      # Disable telemetry
      - SCARF_NO_ANALYTICS=true
      - DO_NOT_TRACK=true
      - ANONYMIZED_TELEMETRY=false
    depends_on:
      ollama:
        condition: service_healthy
      searxng:
        condition: service_started
    networks:
      - ai-agent-network

  # ----------------------------------------------------------
  #  SearXNG — self-hosted, privacy-first meta search engine
  # ----------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: ai-agent-searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8080}
      - UWSGI_WORKERS=${SEARXNG_WORKERS:-2}
      - UWSGI_THREADS=${SEARXNG_THREADS:-2}
    networks:
      - ai-agent-network
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ----------------------------------------------------------
#  Persistent volumes (survive container restarts)
# ----------------------------------------------------------
volumes:
  ollama-data:
    name: ai-agent-ollama-data
  webui-data:
    name: ai-agent-webui-data

# ----------------------------------------------------------
#  Internal network
# ----------------------------------------------------------
networks:
  ai-agent-network:
    driver: bridge
    name: ai-agent-network

# ================================================================
#  SearXNG Configuration
#  Docs: https://docs.searxng.org/admin/settings/
# ================================================================

use_default_settings: true

general:
  debug: false
  instance_name: "AI Agent Search"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

server:
  # IMPORTANT: This key is replaced automatically by the setup script.
  # Do NOT leave it as "change-me" in production.
  secret_key: "c326842ba184645921f781c13a25a53b"
  limiter: false
  image_proxy: true
  method: "GET"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-XSS-Protection: 1; mode=block
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

ui:
  static_use_hash: true
  default_locale: ""
  query_in_title: false
  infinite_scroll: true
  center_alignment: false
  default_theme: simple
  theme_args:
    simple_style: dark

search:
  safe_search: 0
  autocomplete: ""
  autocomplete_min: 4
  default_lang: "en"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120
  suspended_times:
    SearxEngineAccessDenied: 86400
    SearxEngineCaptcha: 86400
    SearxEngineTooManyRequests: 3600
    cf_SearxEngineCaptcha: 1296000
    cf_SearxEngineAccessDenied: 86400
    recaptcha_SearxEngineCaptcha: 604800
  formats:
    - html
    - json    # json format required for Open WebUI integration

engines:
  - name: google
    engine: google
    shortcut: g
    timeout: 5.0
    weight: 2

  - name: bing
    engine: bing
    shortcut: b
    timeout: 5.0

  - name: duckduckgo
    engine: duckduckgo
    shortcut: d
    timeout: 5.0

  - name: brave
    engine: brave
    shortcut: br
    timeout: 5.0

  - name: wikipedia
    engine: wikipedia
    shortcut: w
    timeout: 3.0
    weight: 0.5

  - name: github
    engine: github
    shortcut: gh
    timeout: 5.0

  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
    timeout: 5.0

  - name: arxiv
    engine: arxiv
    shortcut: ax
    timeout: 6.0
    categories: [science, it]

outgoing:
  request_timeout: 6.0
  max_request_timeout: 15.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
